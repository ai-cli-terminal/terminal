<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Terminal</title>
  </head>
  <body>
    <main id="terminal-shell">
      <header id="ribbon-bar" aria-label="Terminal controls">
        <div class="ribbon-group" aria-label="Layout">
          <button id="new-window" type="button" title="New window">New Window</button>
          <button id="new-tab" type="button" title="New tab">New Tab</button>
          <button id="split-horizontal" type="button" title="Split horizontally">Split H</button>
          <button id="split-vertical" type="button" title="Split vertically">Split V</button>
        </div>
        <div class="ribbon-group" aria-label="Runtime">
          <label for="runtime-select">Runtime</label>
          <select id="runtime-select">
            <option value="ash">ash</option>
            <option value="ubuntu">Ubuntu</option>
            <option value="docker">Docker</option>
            <option value="codex">Codex</option>
            <option value="claude">Claude</option>
            <option value="gemini">Gemini</option>
          </select>
        </div>
        <div class="ribbon-group runtime-inventory" aria-label="Runtime inventory">
          <span id="runtime-inventory">Runtime check pending</span>
          <button id="ubuntu-install" type="button" title="Install Ubuntu with WSL">Install Ubuntu</button>
          <label for="apt-package-select">Pkg</label>
          <select id="apt-package-select" title="Select Ubuntu apt package">
            <option value="git">Git</option>
          </select>
          <button id="apt-update" type="button" title="Run apt-get update in managed Ubuntu">Apt Update</button>
          <button id="apt-install" type="button" title="Install the selected apt package in managed Ubuntu">Install Pkg</button>
          <button id="docker-install" type="button" title="Install Docker Desktop with winget">Install Docker</button>
          <button id="docker-pull" type="button" title="Pull the managed Docker image">Pull Image</button>
          <label for="docker-app-select">App</label>
          <select id="docker-app-select" title="Select Docker app image">
            <option value="ubuntu-base">Ubuntu Base</option>
          </select>
          <button id="docker-app-pull" type="button" title="Pull the selected Docker app image">Pull App</button>
          <button id="ai-install" type="button" title="Install Codex, Claude, and Gemini inside managed Ubuntu">Install AI CLIs</button>
          <button id="ai-update" type="button" title="Update Codex, Claude, and Gemini inside managed Ubuntu">Update AI CLIs</button>
        </div>
        <div class="ribbon-group ribbon-grow" aria-label="Selected pane">
          <span id="pane-state">Pane 1 · ash</span>
        </div>
      </header>
      <nav id="tab-bar" aria-label="Terminal tabs"></nav>
      <section id="workspace" data-layout="single">
        <section class="pane is-active is-live" data-pane-id="pane-1" aria-label="Terminal pane">
          <div class="pane-header">
            <span>Pane 1</span>
            <span class="pane-runtime">ash</span>
          </div>
          <div id="terminal"></div>
        </section>
      </section>
      <div id="status-bar">
        <div id="status" aria-live="polite"></div>
        <button id="restart" type="button">Restart</button>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
