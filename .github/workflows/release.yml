name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ai_asset: ai-linux-x86_64
            ash_asset: ash-linux-x86_64
            features: "storage tls remote"
            ai_bin: target/release/ai
            ash_bin: target/release/ash
          - os: windows-latest
            ai_asset: ai-windows-x86_64.exe
            ash_asset: ash-windows-x86_64.exe
            features: "storage remote"
            ai_bin: target/release/ai.exe
            ash_bin: target/release/ash.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release --bins --features "${{ matrix.features }}"

      # 깨끗한 Windows 실행 보장: VC++ 재배포(VCRUNTIME140.dll) 동적 의존 금지(fail-closed).
      - name: Assert self-contained (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          foreach ($bin in @("${{ matrix.ai_bin }}", "${{ matrix.ash_bin }}")) {
            $hit = Select-String -Path $bin -Encoding ascii -Pattern 'VCRUNTIME140' -AllMatches
            if ($hit) { throw "릴리즈 중단: $bin 가 VCRUNTIME140 에 의존 — crt-static 확인" }
          }
          Write-Output 'OK: self-contained'

      - name: Package + checksum (Linux)
        if: runner.os == 'Linux'
        run: |
          cp "${{ matrix.ai_bin }}" "${{ matrix.ai_asset }}"
          cp "${{ matrix.ash_bin }}" "${{ matrix.ash_asset }}"
          sha256sum "${{ matrix.ai_asset }}" > "${{ matrix.ai_asset }}.sha256"
          sha256sum "${{ matrix.ash_asset }}" > "${{ matrix.ash_asset }}.sha256"

      - name: Package + checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "${{ matrix.ai_bin }}" "${{ matrix.ai_asset }}"
          Copy-Item "${{ matrix.ash_bin }}" "${{ matrix.ash_asset }}"
          foreach ($asset in @("${{ matrix.ai_asset }}", "${{ matrix.ash_asset }}")) {
            $h = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
            "$h  $asset" | Out-File -Encoding ascii "$asset.sha256"
          }

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.ai_asset }}
            ${{ matrix.ai_asset }}.sha256
            ${{ matrix.ash_asset }}
            ${{ matrix.ash_asset }}.sha256

  windows-gui:
    name: build Windows GUI
    runs-on: windows-latest
    env:
      WINDOWS_TARGET: x86_64-pc-windows-msvc
      WINDOWS_FEATURES: "storage remote"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Build Windows sidecars
        shell: pwsh
        run: cargo build --release --bins --features "$env:WINDOWS_FEATURES" --target "$env:WINDOWS_TARGET"

      - name: Install desktop dependencies
        shell: pwsh
        run: npm ci
        working-directory: desktop

      - name: Install NSIS
        shell: pwsh
        run: |
          choco install nsis -y --no-progress
          $nsis = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
          $nsis | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Stage Tauri sidecars
        shell: pwsh
        run: npm run stage:windows-sidecars -- "$env:WINDOWS_TARGET"
        working-directory: desktop

      - name: Build GUI installer
        shell: pwsh
        run: npm run tauri -- build --target "$env:WINDOWS_TARGET" --bundles nsis --ci --config src-tauri/tauri.windows.conf.example.json
        working-directory: desktop

      - name: Package GUI portable zip
        shell: pwsh
        run: npm run package:windows-portable -- "$env:WINDOWS_TARGET"
        working-directory: desktop

      - name: Checksum GUI installer
        shell: pwsh
        run: |
          $nsisDir = "desktop\src-tauri\target\$env:WINDOWS_TARGET\release\bundle\nsis"
          $installer = Get-ChildItem -LiteralPath $nsisDir -Filter '*.exe' | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated in $nsisDir" }
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $installer.FullName).Hash.ToLower()
          "$hash  $($installer.Name)" | Out-File -Encoding ascii "$($installer.FullName).sha256"

      - name: Assert GUI release assets
        shell: pwsh
        run: |
          $portableDir = "desktop\src-tauri\target\$env:WINDOWS_TARGET\release\portable\ai-terminal-windows-$env:WINDOWS_TARGET"
          foreach ($name in @('ai-terminal.exe', 'ash.exe', 'ai.exe', 'SHA256SUMS.txt')) {
            $path = Join-Path $portableDir $name
            if (-not (Test-Path -LiteralPath $path -PathType Leaf)) { throw "portable file missing: $path" }
          }
          $archive = "$portableDir.zip"
          if (-not (Test-Path -LiteralPath $archive -PathType Leaf)) { throw "portable zip missing: $archive" }
          if (-not (Test-Path -LiteralPath "$archive.sha256" -PathType Leaf)) { throw "portable zip checksum missing: $archive.sha256" }

      - name: Upload Windows GUI to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            desktop/src-tauri/target/${{ env.WINDOWS_TARGET }}/release/portable/ai-terminal-windows-${{ env.WINDOWS_TARGET }}.zip
            desktop/src-tauri/target/${{ env.WINDOWS_TARGET }}/release/portable/ai-terminal-windows-${{ env.WINDOWS_TARGET }}.zip.sha256
            desktop/src-tauri/target/${{ env.WINDOWS_TARGET }}/release/bundle/nsis/*.exe
            desktop/src-tauri/target/${{ env.WINDOWS_TARGET }}/release/bundle/nsis/*.exe.sha256

  android:
    name: build android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android platform and NDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;28.2.13676358"

      - name: Build Rust JNI libraries for all ABIs
        run: bash android/build-rust-jni.sh --profile release

      - name: Prepare Android signing keystore (optional)
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.AI_TERMINAL_ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.AI_TERMINAL_ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.AI_TERMINAL_ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.AI_TERMINAL_ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] &&
             [ -n "$ANDROID_KEYSTORE_PASSWORD" ] &&
             [ -n "$ANDROID_KEY_ALIAS" ] &&
             [ -n "$ANDROID_KEY_PASSWORD" ]; then
            keystore="$RUNNER_TEMP/ai-terminal-android-release.jks"
            printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore"
            {
              echo "AI_TERMINAL_ANDROID_KEYSTORE=$keystore"
              echo "AI_TERMINAL_ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "AI_TERMINAL_ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "AI_TERMINAL_ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
            echo "Android release signing configured"
          else
            echo "Android signing secrets incomplete; building unsigned APK"
          fi

      - name: Test and assemble release APK
        run: cd android && ./gradlew :app:testDebugUnitTest :app:verifyFdroidReleaseInputs :app:assembleRelease :app:verifyNativeLibraries

      - name: Package Android APK + checksum
        run: |
          signed_apk="android/app/build/outputs/apk/release/app-release.apk"
          unsigned_apk="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -f "$signed_apk" ]; then
            asset="ai-terminal-android-universal.apk"
            cp "$signed_apk" "$asset"
          else
            asset="ai-terminal-android-universal-unsigned.apk"
            cp "$unsigned_apk" "$asset"
          fi
          sha256sum "$asset" > "$asset.sha256"

      - name: Upload Android APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ai-terminal-android-universal*.apk
            ai-terminal-android-universal*.apk.sha256
