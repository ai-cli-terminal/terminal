name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # CI 는 외부 AI 호출을 금지한다 (mock provider). 결정성(temperature=0) 강제. (§22.6, §29.13)
  AI_TERMINAL_PROVIDER: mock

jobs:
  check:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (warnings = errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Install zsh (generated-hook syntax-check coverage)
        run: sudo apt-get update && sudo apt-get install -y zsh

      - name: Test
        run: cargo test --all-targets

      - name: Build (with storage feature)
        run: cargo build --features storage

      - name: Clippy + build (with tls feature)
        run: |
          cargo clippy --all-targets --features tls -- -D warnings
          cargo build --features "storage tls"

  audit:
    name: cargo audit (supply chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit
        run: cargo audit

  android-native:
    name: android JNI packaging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.1.0"

      - name: Install Android platform and NDK
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Build Rust JNI libraries for all ABIs
        shell: pwsh
        run: android/build-rust-jni.ps1 -Profile debug

      - name: Verify JNI libraries
        run: gradle -p android :app:verifyNativeLibraries

      - name: Test Android JVM contracts
        run: gradle -p android :app:testDebugUnitTest

      # x86_64 에뮬레이터는 KVM 가속이 없으면 부팅하지 못해 adb 연결이 끝없이 실패한다.
      # /dev/kvm 을 runner 사용자가 쓸 수 있도록 udev 규칙으로 권한을 연다.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Smoke JNI bridge on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          arch: x86_64
          target: google_apis
          script: gradle -p android :app:connectedDebugAndroidTest

      - name: Assemble debug APK with native libraries
        run: gradle -p android :app:assembleDebug

  windows:
    name: windows build + self-contained check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # 릴리즈와 동일 feature 세트(msvc, .cargo/config.toml 의 crt-static 적용).
      - name: Build (release feature set)
        run: cargo build --release --bins --features "storage remote"

      - name: Smoke ai.exe
        run: ./target/release/ai.exe --version

      - name: Smoke Windows ConPTY
        shell: pwsh
        run: cargo test --release --features remote windows_conpty_cmd_echoes_input -- --nocapture

      - name: Smoke ash.exe
        shell: pwsh
        run: |
          $ash = Resolve-Path ./target/release/ash.exe
          $core = "[{size: 50} {size: 200}] | where size > 100`nexit`n" | & $ash 2>&1 | Out-String
          if ($LASTEXITCODE -ne 0) { throw "ash core smoke failed (exit $LASTEXITCODE): $core" }
          if ($core -notmatch '\b200\b' -or $core -match '\b50\b') { throw "ash core smoke output mismatch: $core" }

          $tmp = New-Item -ItemType Directory -Force -Path (Join-Path $env:RUNNER_TEMP 'ash-smoke')
          Set-Content -Path (Join-Path $tmp 'ash-smoke.cmd') -Encoding ascii -Value "@echo off`r`necho CMD_OK`r`nexit /b 0`r`n"
          Set-Content -Path (Join-Path $tmp 'ash-ps.ps1') -Encoding ascii -Value "Write-Output 'PS_OK'`r`nexit 0`r`n"
          Set-Content -Path (Join-Path $tmp 'ash-fail.cmd') -Encoding ascii -Value "@echo off`r`nexit /b 7`r`n"
          Set-Content -Path (Join-Path $tmp 'ash-fail.ps1') -Encoding ascii -Value "exit 9`r`n"

          Push-Location $tmp
          try {
            $cmdOut = "ash-smoke`nexit`n" | & $ash 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0 -or $cmdOut -notmatch 'CMD_OK') { throw "ash .cmd smoke failed: $cmdOut" }
            $psOut = "ash-ps.ps1`nexit`n" | & $ash 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0 -or $psOut -notmatch 'PS_OK') { throw "ash .ps1 smoke failed: $psOut" }
            $cmdFail = "ash-fail`nexit`n" | & $ash 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0 -or $cmdFail -notmatch '\[ash-fail: exit 7\]') { throw "ash .cmd exit-code smoke failed: $cmdFail" }
            $psFail = "ash-fail.ps1`nexit`n" | & $ash 2>&1 | Out-String
            if ($LASTEXITCODE -ne 0 -or $psFail -notmatch '\[ash-fail.ps1: exit 9\]') { throw "ash .ps1 exit-code smoke failed: $psFail" }
          } finally {
            Pop-Location
          }

      # 깨끗한 Windows 실행 보장: VC++ 재배포(VCRUNTIME140.dll) 동적 의존이 없어야 함.
      - name: Assert self-contained (no VCRUNTIME140 dependency)
        shell: pwsh
        run: |
          $hit = Select-String -Path target/release/ai.exe -Encoding ascii -Pattern 'VCRUNTIME140' -AllMatches
          if ($hit) { throw "self-contained 빌드 실패: VCRUNTIME140 의존 잔존 — .cargo/config.toml crt-static 확인" }
          Write-Output 'OK: VCRUNTIME140 의존 없음(self-contained)'
